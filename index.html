<!DOCTYPE html>
<html>
<head>
<title>Click Yes Game</title>
<style>
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
  }

  #noBtn {
    position: absolute;
  }

  .container {
    text-align: center;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Will you say YES?</h2>
  <button onclick="window.location.href='https://www.instagram.com/gmlc_iimi/'">Yes</button>
  <button id="noBtn">No</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");
let count = 0;

noBtn.addEventListener("mouseover", () => {
  count++;

  if(count === 5) alert("Stop trying 😭");
  if(count === 10) alert("You cannot escape destiny 😎");

  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random()*maxX + "px";
  noBtn.style.top = Math.random()*maxY + "px";
});
</script>

</body>
</html>
