<!DOCTYPE html>
<html>
<head>
<title>Click Yes Game</title>
<style>
  body {
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;

    /* optimized background placement */
    background: url('bg.jpg') no-repeat center bottom/cover;

    /* slight overlay for readability */
    background-color: rgba(0,0,0,0.25);
    background-blend-mode: darken;
  }

  #noBtn {
    position: absolute;
  }

  .container {
    text-align: center;
    color: white;
    transform: translateY(-40px);
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
  }

  #transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #transition.active {
    opacity: 1;
    pointer-events: all;
  }

  .message {
    color: white;
    font-size: 28px;
    animation: fadeText 1.2s infinite alternate;
  }

  @keyframes fadeText {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>Will you say YES?</h2>
  <button onclick="showTransition()">Yes</button>
  <button id="noBtn">No</button>
</div>

<div id="transition">
  <div class="message">Opening something special ❤️</div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
let count = 0;

noBtn.addEventListener("mouseover", () => {
  count++;

  if(count === 5) alert("Stop trying 😭");
  if(count === 10) alert("You cannot escape destiny 😎");
  if(count === 30) alert("You still trying???? 😭");

  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
});

function showTransition() {
  const screen = document.getElementById("transition");
  screen.classList.add("active");

  setTimeout(() => {
    window.location.href = "https://www.instagram.com/gmlc_iimi/";
  }, 1800);
}
</script>

</body>
</html>
